services:

  postgres:
    image: postgres:16
    container_name: openclaw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: openclaw
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  chromadb:
    image: chromadb/chroma:latest
    container_name: openclaw_chromadb
    restart: unless-stopped
    volumes:
      - ./chromadb:/chroma/chroma
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama:latest
    container_name: openclaw_ollama
    restart: unless-stopped
    volumes:
      - ./ollama:/root/.ollama
    ports:
      - "11434:11434"

  fastapi:
    build: .
    container_name: openclaw_fastapi
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ollama
